<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"> 
<title> formulario </title>
<link rel="stylesheet" href="style.css"> 
</head>

<body>
<div class="container">
  <h1>Biblioteca - Ifal </h1>

  <form>
    <label for="nome">Nome do aluno (a):</label>
    <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>

    <label for="turma">Turma:</label>
    <input type="text" id="turma" name="turma" placeholder="Digite sua turma" required>

    <label for="livro">Nome do livro:</label>
    <input type="text" id="livro" name="livro" placeholder="Nome do livro" required>

    <label for="genero">Gênero do livro:</label>
    <select id="genero" name="genero">
      <option> </option>
      <option>Romance</option>
      <option>Fantasia</option>
      <option>Terror</option>
      <option>Aventura</option>
      <option>Suspense</option>
      <option>Didático</option>
    </select>

    <label for="data">Data de empréstimo:</label>
    <input type="date" id="data" name="data" required>

    <label for="observacao">Observações:</label>
    <input type:"text" id="observacao" name="observacao" placeholder="Observações">

    <button type="submit">Enviar</button>
  </form>
</div>

</body>
</html>
 


 </html>
