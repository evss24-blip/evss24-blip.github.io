<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Matrícula Acadêmica</title>
</head>
<body>

<h1>Formulário de Matrícula</h1>
<p> Campos obrigatórios</p>

<form action="https://httpbin.org/post" method="post">
<fieldset>
<legend>Dados Pessoais</legend>

<label for="nome">Nome completo*:</label><br>
<input type="text" id="nome" name="nome" required minlength="5" maxlength="100"><br><br>

<label for="cpf">CPF*:</label><br>
<input type="text" id="cpf" name="cpf" required 
pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" 
placeholder="000.000.000-00"
title="CPF no formato 000.000.000-00"><br><br>

<label for="telefone">Telefone:</label><br>
<input type="tel" id="telefone" name="telefone" 
pattern="\(\d{2}\)\s\d{4,5}-\d{4}" 
placeholder="(82) 99999-9999"><br><br>

<label for="email">E-mail*:</label><br>
<input type="email" id="email" name="email" required><br><br>

</fieldset>
<fieldset>
<legend>Dados Acadêmicos</legend>

<label for="curso">Curso*:</label><br>
<select id="curso" name="curso" required>
<option value="">Selecione um curso</option>

<optgroup label="Computação">
<option>Sistemas de Informação</option>
<option>Ciência da Computação</option>
<option>Engenharia da Computação</option>
</optgroup>

<optgroup label="Gestão">
<option>Administração</option>
<option>Ciências Contábeis</option>
</optgroup>
</select><br><br>
<fieldset>
<legend>Período*</legend>
<input type="radio" id="manha" name="periodo" value="manha">
<label for="manha">Manhã</label><br>
<input type="radio" id="tarde" name="periodo" value="tarde">
<label for="tarde">Tarde</label><br>
<input type="radio" id="noite" name="periodo" value="noite">
<label for="noite">Noite</label>
</fieldset><br>
<label for="ano">Ano de ingresso*:</label><br>
<input type="number" id="ano" name="ano_ingresso" min="2025" max="2030" required><br><br>
</fieldset>

<fieldset>
<legend>Áreas de Interesse</legend>
<input type="checkbox" name="interesses[]" value="web"> Web<br>
<input type="checkbox" name="interesses[]" value="banco"> Banco de Dados<br>
<input type="checkbox" name="interesses[]" value="ia"> Inteligência Artificial<br>
<input type="checkbox" name="interesses[]" value="seguranca"> Segurança<br>
<input type="checkbox" name="interesses[]" value="infra"> Infraestrutura<br>
</fieldset><br>
<button type="submit">Solicitar matrícula</button>
<button type="reset">Limpar formulário</button>
</form>
</body>
</html>
