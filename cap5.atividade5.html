<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pesquisa Acadêmica</title>
</head>
<body>

<h1>Formulário de Pesquisa Acadêmica</h1>

<form action="https://httpbin.org/post" method="post" novalidate>

    <fieldset>
        <legend>Perfil do estudante</legend>

        <label for="nome">Nome completo:</label><br>
        <input type="text" id="nome" name="nome"><br><br>

        <label for="matricula">Matrícula:</label><br>
        <input type="text" id="matricula" name="matricula" pattern="\d{7}"><br><br>

        <label for="email">E-mail institucional:</label><br>
        <input type="email" id="email" name="email" required onblur="validarEmail(this)">
        <p id="erro-email" role="alert"></p>

        <label for="periodo">Período atual:</label><br>
        <select id="periodo" name="periodo">
            <option value="">Selecione</option>
            <option value="1">1º período</option>
            <option value="2">2º período</option>
            <option value="3">3º período</option>
            <option value="4">4º período</option>
            <option value="5">5º período</option>
            <option value="6">6º período</option>
            <option value="7">7º período</option>
            <option value="8">8º período</option>
        </select><br><br>

        <p>Turno:</p>
        <input type="radio" id="manha" name="turno" value="manha">
        <label for="manha">Manhã</label><br>

        <input type="radio" id="tarde" name="turno" value="tarde">
        <label for="tarde">Tarde</label><br>

        <input type="radio" id="noite" name="turno" value="noite">
        <label for="noite">Noite</label><br><br>
    </fieldset>

    <fieldset>
        <legend>Perfil tecnológico</legend>

        <p>Tecnologias que conhece:</p>

        <input type="checkbox" name="tecnologias[]" value="html"> HTML<br>
        <input type="checkbox" name="tecnologias[]" value="css"> CSS<br>
        <input type="checkbox" name="tecnologias[]" value="javascript"> JavaScript<br>
        <input type="checkbox" name="tecnologias[]" value="python"> Python<br>
        <input type="checkbox" name="tecnologias[]" value="java"> Java<br>
        <input type="checkbox" name="tecnologias[]" value="php"> PHP<br>
        <input type="checkbox" name="tecnologias[]" value="sql"> SQL<br>
        <input type="checkbox" name="tecnologias[]" value="git"> Git<br><br>

        <label for="linguagem">Linguagem favorita:</label><br>
        <select id="linguagem" name="linguagem">
            <optgroup label="Front-end">
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="javascript">JavaScript</option>
            </optgroup>

            <optgroup label="Back-end">
                <option value="python">Python</option>
                <option value="java">Java</option>
                <option value="php">PHP</option>
            </optgroup>
        </select><br><br>

        <label for="experiencia">Anos de experiência:</label><br>
        <input type="number" id="experiencia" name="experiencia" min="0" max="30"><br><br>

        <label for="portfolio">URL do portfólio ou LinkedIn:</label><br>
        <input type="url" id="portfolio" name="portfolio" placeholder="https://"><br><br>
    </fieldset>

    <fieldset>
        <legend>Avaliação da disciplina</legend>

        <label for="nota">Nota para a disciplina: <span id="valor-nota">5</span>/10</label><br>
        <input type="range" id="nota" name="nota" min="0" max="10" value="5"
        oninput="document.getElementById('valor-nota').textContent = this.value"><br><br>

        <p>Satisfação com o material didático:</p>

        <input type="radio" id="muito_satisfeito" name="satisfacao" value="muito_satisfeito">
        <label for="muito_satisfeito">Muito satisfeito</label><br>

        <input type="radio" id="satisfeito" name="satisfacao" value="satisfeito">
        <label for="satisfeito">Satisfeito</label><br>

        <input type="radio" id="neutro" name="satisfacao" value="neutro">
        <label for="neutro">Neutro</label><br>

        <input type="radio" id="insatisfeito" name="satisfacao" value="insatisfeito">
        <label for="insatisfeito">Insatisfeito</label><br>

        <input type="radio" id="muito_insatisfeito" name="satisfacao" value="muito_insatisfeito">
        <label for="muito_insatisfeito">Muito insatisfeito</label><br><br>

        <label for="sugestoes">Sugestões de melhoria:</label><br>
        <textarea id="sugestoes" name="sugestoes" maxlength="1000" rows="6"></textarea><br><br>

        <label for="data">Data de preenchimento:</label><br>
        <input type="date" id="data" name="data" required><br><br>
    </fieldset>

    <fieldset>
        <legend>Consentimento e envio</legend>

        <input type="checkbox" id="consentimento" name="consentimento" required>
        <label for="consentimento">Autorizo o uso dos dados para fins acadêmicos</label><br><br>

        <input type="hidden" name="pesquisa_id" value="PWEB1-2026-1">

        <button type="submit">Enviar pesquisa</button>
        <button type="reset">Limpar formulário</button>
    </fieldset>

</form>

<script>
function validarEmail(campo) {
    const erro = document.getElementById('erro-email');

    if (!campo.value.endsWith('@ifal.edu.br')) {
        erro.textContent = 'Informe seu e-mail institucional (@ifal.edu.br)';
        campo.setAttribute('aria-invalid', 'true');
    } else {
        erro.textContent = '';
        campo.setAttribute('aria-invalid', 'false');
    }
}
</script>
<p> <a href="../index.html"> &larr; Voltar para a página </a></p>
</body>
</html>
