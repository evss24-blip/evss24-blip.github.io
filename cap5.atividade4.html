<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Inscrição em Evento</title>
</head>
<body>

<h1>Semana de Tecnologia IFAL</h1>

<form action="https://httpbin.org/post" method="post" enctype="multipart/form-data">

    <label for="nome">Nome completo:</label><br>
    <input type="text" id="nome" name="nome" required><br><br>

    <label for="email">E-mail institucional:</label><br>
    <input type="email" id="email" name="email" required><br><br>

    <label for="cidade">Cidade de origem:</label><br>
    <input type="text" id="cidade" name="cidade" list="cidades"><br>
    <datalist id="cidades">
        <option value="Maceió">
        <option value="Arapiraca">
        <option value="Palmeira dos Índios">
        <option value="Penedo">
        <option value="Rio Largo">
        <option value="Marechal Deodoro">
        <option value="Satuba">
        <option value="Coruripe">
    </datalist><br>

    <label for="foto">Foto para crachá:</label><br>
    <input type="file" id="foto" name="foto" accept="image/jpeg,image/png" aria-describedby="ajuda-foto"><br>
    <small id="ajuda-foto">Formatos aceitos: JPG e PNG. Tamanho máximo: 2 MB.</small><br><br>

    <label for="chegada">Data e hora preferida para chegada:</label><br>
    <input type="datetime-local" id="chegada" name="chegada"><br><br>

    <label for="experiencia">
        Nível de experiência: <span id="valor-experiencia">5</span>/10
    </label><br>
    <input 
        type="range" 
        id="experiencia" 
        name="experiencia" 
        min="0" 
        max="10" 
        step="1" 
        value="5"
        oninput="document.getElementById('valor-experiencia').textContent = this.value"
    ><br><br>

    <label for="cor_camiseta">Cor de preferência para a camiseta:</label><br>
    <input type="color" id="cor_camiseta" name="cor_camiseta" value="#1a73e8"><br><br>

    <label for="oficinas">Oficinas de interesse:</label><br>
    <select id="oficinas" name="oficinas[]" multiple size="4" aria-describedby="ajuda-oficinas">
        <option value="web">Desenvolvimento Web</option>
        <option value="banco">Banco de Dados</option>
        <option value="ia">Inteligência Artificial</option>
        <option value="seguranca">Segurança da Informação</option>
        <option value="infra">Infraestrutura</option>
    </select><br>
    <small id="ajuda-oficinas">Use Ctrl para selecionar mais de uma oficina.</small><br><br>

    <input type="hidden" name="edicao" value="2026">

    <button type="submit">Confirmar inscrição</button>

</form>

</body>
</html>
